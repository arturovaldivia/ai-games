<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Bouncy</title>
  <style>
    :root {
      --bg-1: #06203d;
      --bg-2: #0d355f;
      --panel: #f6fbff;
      --text: #11243b;
      --accent: #ff7a18;
      --accent-2: #1fa2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1300px 600px at 50% -10%, #2a8fd1 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(92vw, 720px);
      background: var(--panel);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(3, 17, 33, 0.4);
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      letter-spacing: 0.4px;
    }

    .sub {
      margin: 0 0 14px;
      color: #415a74;
      font-size: 0.96rem;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 3px solid #0e2d4e;
      border-radius: 14px;
      background: #ebf7ff;
      cursor: crosshair;
    }

    .hud {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .pill {
      background: #e6f3ff;
      border: 1px solid #bddcff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.92rem;
      color: #163653;
    }

    .builder {
      width: 100%;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: #edf7ff;
      border: 1px solid #cce3f7;
      border-radius: 12px;
      padding: 10px;
    }

    .builder label {
      font-size: 0.88rem;
      color: #21496b;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .builder input[type="range"] {
      width: 160px;
    }

    .speed-value {
      min-width: 58px;
      font-size: 0.88rem;
      color: #21496b;
      font-weight: 700;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #ff5630);
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.04);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">New Bouncy</h1>
    <p class="sub">Click in the bottom empty zone to drop the pointy bouncer. Clear all bubbles to win.</p>

    <canvas id="game" width="560" height="560" aria-label="New Bouncy Game Board"></canvas>

    <div class="hud">
      <div class="pill" id="status">Bubbles left: 0</div>
      <div class="pill" id="hint">Bottom 20% is your launch zone</div>
      <div class="pill" id="arsenal">Pointies ready: 0</div>
      <button id="restart" type="button">Restart</button>

      <div class="builder">
        <label for="pointyColor">Pointy color
          <input id="pointyColor" type="color" value="#ffb703" />
        </label>
        <label for="pointySpeed">Pointy speed
          <input id="pointySpeed" type="range" min="160" max="520" step="10" value="280" />
        </label>
        <span class="speed-value" id="speedValue">280 px/s</span>
        <button id="addPointy" type="button">Add Pointy</button>
      </div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusLabel = document.getElementById("status");
    const hintLabel = document.getElementById("hint");
    const arsenalLabel = document.getElementById("arsenal");
    const restartBtn = document.getElementById("restart");
    const pointyColorInput = document.getElementById("pointyColor");
    const pointySpeedInput = document.getElementById("pointySpeed");
    const speedValueLabel = document.getElementById("speedValue");
    const addPointyBtn = document.getElementById("addPointy");

    const COLS = 8;
    const ROWS = 8;
    const CELL = canvas.width / COLS;
    const BUBBLE_ROWS = Math.floor(ROWS * 0.8);
    const LAUNCH_Y = BUBBLE_ROWS * CELL;

    const POINT_SIZE = 12;
    const PROJECTILE_RADIUS = POINT_SIZE * 0.85;
    const DEFAULT_POINTY_SPEED = 280;
    const MIN_POINTY_SPEED = 160;
    const MAX_POINTY_SPEED = 520;

    const BUBBLE_RADIUS = CELL * 0.42;
    const GRAVITY = 1200;
    const DRAG = 0.992;
    const WALL_BOUNCE = 0.18;

    const BUBBLE_TYPES = [
      { color: "#8ac926", hp: 1, name: "Green" },
      { color: "#ffca3a", hp: 2, name: "Yellow" },
      { color: "#ff924c", hp: 3, name: "Orange" },
      { color: "#ff595e", hp: 4, name: "Red" }
    ];

    let bubbles = [];
    let bubblesLeft = 0;
    let win = false;
    let pointies = [];
    let pointyQueue = [];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomBubbleType() {
      return BUBBLE_TYPES[Math.floor(Math.random() * BUBBLE_TYPES.length)];
    }

    function updateStatus() {
      statusLabel.textContent = `Bubbles left: ${bubblesLeft}`;
    }

    function updateArsenalLabel() {
      arsenalLabel.textContent = `Pointies ready: ${pointyQueue.length}`;
    }

    function createPointy(x, y, color, speed) {
      const clampedSpeed = Math.max(MIN_POINTY_SPEED, Math.min(MAX_POINTY_SPEED, speed));
      const launchDeg = rand(-135, -45);
      const rad = (launchDeg * Math.PI) / 180;

      return {
        x,
        y,
        vx: Math.cos(rad) * clampedSpeed,
        vy: Math.sin(rad) * clampedSpeed,
        angle: rad,
        color,
        speed: clampedSpeed
      };
    }

    function queuePointy(color, speed) {
      pointyQueue.push({ color, speed });
      updateArsenalLabel();
    }

    function initBubbles() {
      bubbles = [];

      const gap = BUBBLE_RADIUS * 0.04;
      const spacingX = BUBBLE_RADIUS * 2 - gap;
      const spacingY = Math.sqrt(3) * BUBBLE_RADIUS - gap;
      const minX = BUBBLE_RADIUS + 2;
      const maxX = canvas.width - BUBBLE_RADIUS - 2;
      const maxY = LAUNCH_Y - BUBBLE_RADIUS - 2;

      let row = 0;
      for (let y = BUBBLE_RADIUS + 2; y <= maxY; y += spacingY) {
        const offset = row % 2 === 0 ? 0 : BUBBLE_RADIUS;
        for (let x = minX + offset; x <= maxX; x += spacingX) {
          const type = randomBubbleType();
          bubbles.push({
            x,
            y,
            vx: 0,
            vy: 0,
            color: type.color,
            maxHp: type.hp,
            hp: type.hp
          });
        }
        row += 1;
      }

      bubblesLeft = bubbles.length;
      updateStatus();
      hintLabel.textContent = "Bottom 20% is your launch zone | HP: Green 1, Yellow 2, Orange 3, Red 4";
    }

    function resetGame() {
      pointies = [];
      pointyQueue = [];
      win = false;
      initBubbles();
      queuePointy(pointyColorInput.value, Number(pointySpeedInput.value));
      draw();
    }

    function setDirectionByWall(pointy, wall) {
      let deg;
      if (wall === "left") deg = rand(-75, 75);
      else if (wall === "right") deg = rand(105, 255);
      else if (wall === "top") deg = rand(20, 160);
      else deg = rand(-160, -20);

      const rad = (deg * Math.PI) / 180;
      pointy.vx = Math.cos(rad) * pointy.speed;
      pointy.vy = Math.sin(rad) * pointy.speed;
      pointy.angle = Math.atan2(pointy.vy, pointy.vx);
    }

    function bounceAfterBubbleHit(pointy) {
      const base = Math.atan2(pointy.vy, pointy.vx) + Math.PI;
      const jitter = rand((-50 * Math.PI) / 180, (50 * Math.PI) / 180);
      const rad = base + jitter;
      pointy.vx = Math.cos(rad) * pointy.speed;
      pointy.vy = Math.sin(rad) * pointy.speed;
      pointy.angle = Math.atan2(pointy.vy, pointy.vx);
    }

    function launchPointyFromQueue(x, y) {
      if (pointyQueue.length === 0) {
        hintLabel.textContent = "No pointies ready. Use Add Pointy first.";
        return false;
      }

      const next = pointyQueue.shift();
      pointies.push(createPointy(x, y, next.color, next.speed));
      updateArsenalLabel();
      hintLabel.textContent = "Bouncing... pop every bubble";
      return true;
    }

    function constrainBubbleToField(bubble) {
      if (bubble.x < BUBBLE_RADIUS) {
        bubble.x = BUBBLE_RADIUS;
        if (bubble.vx < 0) bubble.vx *= -WALL_BOUNCE;
      } else if (bubble.x > canvas.width - BUBBLE_RADIUS) {
        bubble.x = canvas.width - BUBBLE_RADIUS;
        if (bubble.vx > 0) bubble.vx *= -WALL_BOUNCE;
      }

      if (bubble.y < BUBBLE_RADIUS) {
        bubble.y = BUBBLE_RADIUS;
        if (bubble.vy < 0) bubble.vy *= -WALL_BOUNCE;
      } else if (bubble.y > LAUNCH_Y - BUBBLE_RADIUS) {
        bubble.y = LAUNCH_Y - BUBBLE_RADIUS;
        if (bubble.vy > 0) bubble.vy *= -WALL_BOUNCE;
        bubble.vx *= 0.985;
      }
    }

    function resolveBubblePair(a, b) {
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.hypot(dx, dy);
      const minDist = BUBBLE_RADIUS * 2;

      if (dist >= minDist) return;

      if (dist < 0.0001) {
        const angle = Math.random() * Math.PI * 2;
        dx = Math.cos(angle);
        dy = Math.sin(angle);
        dist = 1;
      }

      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist;

      // Symmetric positional correction keeps particles from interpenetrating.
      a.x -= nx * overlap * 0.5;
      a.y -= ny * overlap * 0.5;
      b.x += nx * overlap * 0.5;
      b.y += ny * overlap * 0.5;

      const rvx = b.vx - a.vx;
      const rvy = b.vy - a.vy;
      const relNormalVel = rvx * nx + rvy * ny;

      if (relNormalVel < 0) {
        const restitution = 0.22;
        const impulse = (-(1 + restitution) * relNormalVel) / 2;
        a.vx -= impulse * nx;
        a.vy -= impulse * ny;
        b.vx += impulse * nx;
        b.vy += impulse * ny;
      }
    }

    function updateBubbles(stepDt) {
      for (let i = 0; i < bubbles.length; i += 1) {
        const bubble = bubbles[i];
        bubble.vy += GRAVITY * stepDt;
        bubble.x += bubble.vx * stepDt;
        bubble.y += bubble.vy * stepDt;
        bubble.vx *= DRAG;
        bubble.vy *= DRAG;
        constrainBubbleToField(bubble);
      }

      for (let iter = 0; iter < 4; iter += 1) {
        for (let i = 0; i < bubbles.length; i += 1) {
          for (let j = i + 1; j < bubbles.length; j += 1) {
            resolveBubblePair(bubbles[i], bubbles[j]);
          }
        }
        for (let i = 0; i < bubbles.length; i += 1) {
          constrainBubbleToField(bubbles[i]);
        }
      }
    }

    function findHitBubbleIndex(x, y) {
      const maxDist = BUBBLE_RADIUS + PROJECTILE_RADIUS;
      const maxDistSq = maxDist * maxDist;

      let hitIndex = -1;
      let bestDistSq = Infinity;

      for (let i = 0; i < bubbles.length; i += 1) {
        const bubble = bubbles[i];
        const dx = x - bubble.x;
        const dy = y - bubble.y;
        const d2 = dx * dx + dy * dy;
        if (d2 <= maxDistSq && d2 < bestDistSq) {
          hitIndex = i;
          bestDistSq = d2;
        }
      }

      return hitIndex;
    }

    function nudgeNearbyBubbles(cx, cy) {
      for (let i = 0; i < bubbles.length; i += 1) {
        const bubble = bubbles[i];
        const dx = bubble.x - cx;
        const dy = bubble.y - cy;
        const dist = Math.hypot(dx, dy);
        const reach = BUBBLE_RADIUS * 3.2;
        if (dist < 0.0001 || dist > reach) continue;

        const nx = dx / dist;
        const ny = dy / dist;
        const strength = (1 - dist / reach) * 85;
        bubble.vx += nx * strength;
        bubble.vy += ny * strength * 0.65;
      }
    }

    function applyHitToBubble(index, pointy) {
      if (index < 0 || index >= bubbles.length) return false;

      const bubble = bubbles[index];
      bubble.hp -= 1;

      const speed = Math.hypot(pointy.vx, pointy.vy) || 1;
      bubble.vx += (pointy.vx / speed) * 45;
      bubble.vy += (pointy.vy / speed) * 45;

      if (bubble.hp <= 0) {
        const poppedX = bubble.x;
        const poppedY = bubble.y;
        bubbles.splice(index, 1);
        bubblesLeft -= 1;
        updateStatus();
        nudgeNearbyBubbles(poppedX, poppedY);
      }

      if (bubblesLeft <= 0) {
        win = true;
        pointies = [];
        hintLabel.textContent = "All bubbles destroyed. You win!";
      }

      return true;
    }

    function updatePointy(pointy, stepDt) {
      if (win) return;

      pointy.x += pointy.vx * stepDt;
      pointy.y += pointy.vy * stepDt;

      if (pointy.x <= POINT_SIZE) {
        pointy.x = POINT_SIZE;
        setDirectionByWall(pointy, "left");
      } else if (pointy.x >= canvas.width - POINT_SIZE) {
        pointy.x = canvas.width - POINT_SIZE;
        setDirectionByWall(pointy, "right");
      }

      if (pointy.y <= POINT_SIZE) {
        pointy.y = POINT_SIZE;
        setDirectionByWall(pointy, "top");
      } else if (pointy.y >= canvas.height - POINT_SIZE) {
        pointy.y = canvas.height - POINT_SIZE;
        setDirectionByWall(pointy, "bottom");
      }

      pointy.angle = Math.atan2(pointy.vy, pointy.vx);

      const hitIndex = findHitBubbleIndex(pointy.x, pointy.y);
      if (hitIndex !== -1 && applyHitToBubble(hitIndex, pointy) && !win) {
        bounceAfterBubbleHit(pointy);
      }
    }

    function update(dt) {
      const subSteps = 3;
      const stepDt = dt / subSteps;

      for (let i = 0; i < subSteps; i += 1) {
        for (let j = 0; j < pointies.length; j += 1) {
          updatePointy(pointies[j], stepDt);
        }
        updateBubbles(stepDt);
      }
    }

    function drawBubble(bubble) {
      const cx = bubble.x;
      const cy = bubble.y;
      const radius = BUBBLE_RADIUS;

      const grad = ctx.createRadialGradient(
        cx - radius * 0.4,
        cy - radius * 0.45,
        radius * 0.15,
        cx,
        cy,
        radius
      );
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.35, bubble.color);
      grad.addColorStop(1, "rgba(0,0,0,0.25)");

      ctx.beginPath();
      ctx.fillStyle = grad;
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();

      const hpRatio = bubble.hp / bubble.maxHp;
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(0, 0, 0, 0.28)";
      ctx.arc(cx, cy, radius * 0.75, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * hpRatio);
      ctx.stroke();
    }

    function drawPointy(pointy) {
      ctx.save();
      ctx.translate(pointy.x, pointy.y);
      ctx.rotate(pointy.angle);

      ctx.beginPath();
      ctx.moveTo(POINT_SIZE, 0);
      ctx.lineTo(-POINT_SIZE * 0.9, POINT_SIZE * 0.55);
      ctx.lineTo(-POINT_SIZE * 0.9, -POINT_SIZE * 0.55);
      ctx.closePath();

      ctx.fillStyle = pointy.color;
      ctx.fill();

      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.stroke();
      ctx.restore();
    }

    function drawBoard() {
      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, "#d7f1ff");
      bg.addColorStop(1, "#f7fdff");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(31, 162, 255, 0.12)";
      ctx.fillRect(0, LAUNCH_Y, canvas.width, canvas.height - LAUNCH_Y);

      ctx.strokeStyle = "#1f4f7e";
      ctx.setLineDash([7, 7]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, LAUNCH_Y);
      ctx.lineTo(canvas.width, LAUNCH_Y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function draw() {
      drawBoard();

      bubbles.sort((a, b) => a.y - b.y);
      for (let i = 0; i < bubbles.length; i += 1) {
        drawBubble(bubbles[i]);
      }

      for (let i = 0; i < pointies.length; i += 1) {
        drawPointy(pointies[i]);
      }

      if (win) {
        ctx.save();
        ctx.fillStyle = "rgba(5, 25, 40, 0.45)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "bold 42px Trebuchet MS";
        ctx.fillText("YOU WIN", canvas.width / 2, canvas.height / 2 - 8);
        ctx.font = "20px Trebuchet MS";
        ctx.fillText("Press Restart to play again", canvas.width / 2, canvas.height / 2 + 30);
        ctx.restore();
      }
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, 0.033);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("click", (event) => {
      if (win) return;

      const rect = canvas.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * canvas.width;
      const y = ((event.clientY - rect.top) / rect.height) * canvas.height;

      if (y < LAUNCH_Y) {
        hintLabel.textContent = "Click inside the bottom empty zone to launch";
        return;
      }

      launchPointyFromQueue(x, y);
    });

    pointySpeedInput.addEventListener("input", () => {
      speedValueLabel.textContent = `${pointySpeedInput.value} px/s`;
    });

    addPointyBtn.addEventListener("click", () => {
      queuePointy(pointyColorInput.value, Number(pointySpeedInput.value));
      hintLabel.textContent = "Pointy added. Click in launch zone to drop it.";
    });

    restartBtn.addEventListener("click", resetGame);

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
