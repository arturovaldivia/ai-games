<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dots and Boxes</title>
  <style>
    :root {
      --bg-1: #f2efe8;
      --bg-2: #d7ece4;
      --panel: #fffdf8;
      --ink: #253238;
      --muted: #677176;
      --human: #14635d;
      --ai: #b13a2d;
      --line-empty: #9eaaa7;
      --dot: #26353a;
      --shadow: 0 10px 30px rgba(37, 50, 56, 0.16);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Futura", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(177, 58, 45, 0.14), transparent 42%),
        radial-gradient(circle at 90% 82%, rgba(20, 99, 93, 0.16), transparent 36%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(950px, 100%);
      background: var(--panel);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(37, 50, 56, 0.08);
      overflow: hidden;
    }

    .top {
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(37, 50, 56, 0.1);
      background: linear-gradient(90deg, rgba(20, 99, 93, 0.06), rgba(177, 58, 45, 0.06));
    }

    .title {
      margin: 0;
      letter-spacing: 0.04em;
      font-size: 1.35rem;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-right {
      display: grid;
      gap: 10px;
      justify-items: end;
      width: min(100%, 620px);
    }

    .status-row {
      width: 100%;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 10px;
    }

    .pill {
      border: 1px solid rgba(37, 50, 56, 0.2);
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.92rem;
      color: var(--ink);
    }

    .pill input,
    .pill select {
      border: none;
      background: transparent;
      color: var(--ink);
      font: inherit;
      min-width: 58px;
      outline: none;
      margin-left: 6px;
    }

    .pill input[type="range"] {
      min-width: 110px;
      accent-color: var(--ink);
      vertical-align: middle;
    }

    .zoom-value {
      font-size: 0.86rem;
      color: var(--muted);
      margin-left: 4px;
      min-width: 42px;
      display: inline-block;
      text-align: right;
    }

    button {
      border: none;
      background: var(--ink);
      color: #fff;
      font-weight: 600;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .main {
      padding: 20px;
    }

    .board-wrap {
      background: #fff;
      border: 1px solid rgba(37, 50, 56, 0.1);
      border-radius: var(--radius);
      padding: 18px;
      overflow: auto;
    }

    .board {
      --cell-size: 36px;
      --dot-size: 12px;
      --line-thickness: 6px;
      --line-pad: 4px;
      --box-size: 36px;
      display: grid;
      width: max-content;
      margin: 0 auto;
      animation: fade-slide 360ms ease both;
    }

    .dot {
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 50%;
      background: var(--dot);
      justify-self: center;
      align-self: center;
      z-index: 2;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.7);
    }

    .hedge,
    .vedge {
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      padding: 0;
    }

    .hedge::before,
    .vedge::before {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: var(--line-empty);
      opacity: 0.3;
      transition: opacity 120ms ease, transform 120ms ease, background 120ms ease;
    }

    .hedge::before {
      left: var(--line-pad);
      right: var(--line-pad);
      top: 50%;
      height: var(--line-thickness);
      transform: translateY(-50%);
    }

    .vedge::before {
      top: var(--line-pad);
      bottom: var(--line-pad);
      left: 50%;
      width: var(--line-thickness);
      transform: translateX(-50%);
    }

    .hedge.open:hover::before,
    .vedge.open:hover::before {
      opacity: 0.68;
    }

    .hedge.claimed-human::before,
    .vedge.claimed-human::before {
      opacity: 1;
      background: var(--human);
      box-shadow: 0 0 0 2px rgba(20, 99, 93, 0.1);
    }

    .hedge.claimed-ai::before,
    .vedge.claimed-ai::before {
      opacity: 1;
      background: var(--ai);
      box-shadow: 0 0 0 2px rgba(177, 58, 45, 0.1);
    }

    .box {
      width: var(--box-size);
      height: var(--box-size);
      border-radius: 9px;
      align-self: center;
      justify-self: center;
      background: rgba(37, 50, 56, 0.03);
      transition: transform 180ms ease, background 180ms ease;
    }

    .box.human {
      background: color-mix(in srgb, var(--human) 32%, white);
      transform: scale(0.96);
    }

    .box.ai {
      background: color-mix(in srgb, var(--ai) 33%, white);
      transform: scale(0.96);
    }

    .card {
      border: 1px solid rgba(37, 50, 56, 0.12);
      border-radius: var(--radius);
      padding: 14px;
      background: #fff;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
    }

    .score-grid {
      display: grid;
      gap: 8px;
    }

    .score-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 10px;
      padding: 9px 10px;
      font-weight: 600;
      background: rgba(37, 50, 56, 0.04);
    }

    .score-line.human {
      color: var(--human);
    }

    .score-line.ai {
      color: var(--ai);
    }

    .status {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--ink);
      min-height: 40px;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0;
      line-height: 1.45;
    }

    .hint.compact {
      margin-top: 6px;
    }

    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 920px) {
      .top {
        align-items: stretch;
      }

      .top-right {
        justify-items: stretch;
        width: 100%;
      }

      .status-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .title {
        font-size: 1.1rem;
      }

      .top {
        padding: 14px;
      }

      .main {
        padding: 14px;
      }

      .board-wrap {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <section class="shell">
    <header class="top">
      <div>
        <h1 class="title">Dots and Boxes</h1>
        <p class="subtitle">Claim more boxes than the agent. Complete a box, keep your turn.</p>
      </div>
      <div class="top-right">
        <div class="controls">
          <label class="pill" for="size">Grid
            <input id="size" type="number" min="2" max="30" step="1" value="5" list="size-suggestions" aria-label="Board size in boxes per side" />
            <datalist id="size-suggestions">
              <option value="4"></option>
              <option value="5"></option>
              <option value="6"></option>
              <option value="20"></option>
              <option value="21"></option>
            </datalist>
          </label>
          <label class="pill" for="edge-size">Edge px
            <input id="edge-size" type="number" min="8" max="60" step="1" value="36" aria-label="Edge size in pixels" />
          </label>
          <label class="pill" for="zoom">Zoom
            <input id="zoom" type="range" min="50" max="200" step="5" value="100" aria-label="Board zoom percentage" />
            <span id="zoom-value" class="zoom-value">100%</span>
          </label>
          <label class="pill" for="ai-logic">Agent
            <select id="ai-logic">
              <option value="random" selected>Random but Legal</option>
              <option value="minimax">Minimax (Stronger)</option>
              <option value="humanlike">Human-like Minimax</option>
            </select>
          </label>
          <button id="new-game" type="button">New Game</button>
        </div>

        <div class="status-row">
          <section class="card">
            <h2>Score</h2>
            <div class="score-grid">
              <div class="score-line human">You <span id="human-score">0</span></div>
              <div class="score-line ai">Agent <span id="ai-score">0</span></div>
            </div>
          </section>

          <section class="card">
            <h2>Turn</h2>
            <p class="status" id="status"></p>
            <p class="hint compact" id="ai-hint">Click an available edge to draw a line. The agent currently chooses random legal moves.</p>
          </section>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="board-wrap">
        <div id="board" class="board" aria-label="Dots and Boxes board"></div>
      </div>
    </main>
  </section>

  <script>
    const HUMAN = "human";
    const AI = "ai";

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const humanScoreEl = document.getElementById("human-score");
    const aiScoreEl = document.getElementById("ai-score");
    const sizeEl = document.getElementById("size");
    const edgeSizeEl = document.getElementById("edge-size");
    const zoomEl = document.getElementById("zoom");
    const zoomValueEl = document.getElementById("zoom-value");
    const aiLogicEl = document.getElementById("ai-logic");
    const newGameEl = document.getElementById("new-game");
    const aiHintEl = document.getElementById("ai-hint");

    let dots = 6;
    let hEdges = [];
    let vEdges = [];
    let boxes = [];
    let currentPlayer = HUMAN;
    let gameOver = false;
    let edgePx = 36;
    let zoomPercent = 100;

    function make2D(rows, cols, value = null) {
      return Array.from({ length: rows }, () => Array(cols).fill(value));
    }

    function setupState(boxesPerSide) {
      dots = boxesPerSide + 1;
      hEdges = make2D(dots, dots - 1);
      vEdges = make2D(dots - 1, dots);
      boxes = make2D(dots - 1, dots - 1);
      currentPlayer = HUMAN;
      gameOver = false;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getDisplayCellPx() {
      return clamp(Math.round((edgePx * zoomPercent) / 100), 6, 120);
    }

    function gridColumns() {
      return `repeat(${dots * 2 - 1}, ${getDisplayCellPx()}px)`;
    }

    function applyBoardSizing() {
      const parsedEdge = Number(edgeSizeEl.value);
      const parsedZoom = Number(zoomEl.value);
      edgePx = Number.isFinite(parsedEdge) ? clamp(Math.floor(parsedEdge), 8, 60) : 36;
      zoomPercent = Number.isFinite(parsedZoom) ? clamp(Math.floor(parsedZoom), 50, 200) : 100;

      edgeSizeEl.value = String(edgePx);
      zoomEl.value = String(zoomPercent);
      zoomValueEl.textContent = `${zoomPercent}%`;

      const cell = getDisplayCellPx();
      const dot = clamp(Math.round(cell * 0.33), 4, 18);
      const thickness = clamp(Math.round(cell * 0.16), 2, 12);
      const pad = clamp(Math.round(cell * 0.1), 1, 8);

      boardEl.style.gridTemplateColumns = gridColumns();
      boardEl.style.setProperty("--cell-size", `${cell}px`);
      boardEl.style.setProperty("--dot-size", `${dot}px`);
      boardEl.style.setProperty("--line-thickness", `${thickness}px`);
      boardEl.style.setProperty("--line-pad", `${pad}px`);
      boardEl.style.setProperty("--box-size", `${cell}px`);
    }

    function isEdgeClaimed(type, row, col) {
      return type === "h" ? hEdges[row][col] !== null : vEdges[row][col] !== null;
    }

    function claimEdge(type, row, col, player) {
      if (type === "h") hEdges[row][col] = player;
      else vEdges[row][col] = player;
    }

    function checkAndClaimBox(r, c, player) {
      if (boxes[r][c] !== null) return false;
      const top = hEdges[r][c] !== null;
      const bottom = hEdges[r + 1][c] !== null;
      const left = vEdges[r][c] !== null;
      const right = vEdges[r][c + 1] !== null;
      if (top && bottom && left && right) {
        boxes[r][c] = player;
        return true;
      }
      return false;
    }

    function resolveBoxesFromEdge(type, row, col, player) {
      let made = 0;
      if (type === "h") {
        if (row > 0 && checkAndClaimBox(row - 1, col, player)) made += 1;
        if (row < dots - 1 && checkAndClaimBox(row, col, player)) made += 1;
      } else {
        if (col > 0 && checkAndClaimBox(row, col - 1, player)) made += 1;
        if (col < dots - 1 && checkAndClaimBox(row, col, player)) made += 1;
      }
      return made;
    }

    function scoreOf(player) {
      let total = 0;
      for (const row of boxes) {
        for (const owner of row) {
          if (owner === player) total += 1;
        }
      }
      return total;
    }

    function allBoxesClaimed() {
      for (const row of boxes) {
        for (const owner of row) {
          if (owner === null) return false;
        }
      }
      return true;
    }

    function legalMoves() {
      const moves = [];
      for (let r = 0; r < dots; r += 1) {
        for (let c = 0; c < dots - 1; c += 1) {
          if (!hEdges[r][c]) moves.push({ type: "h", row: r, col: c });
        }
      }
      for (let r = 0; r < dots - 1; r += 1) {
        for (let c = 0; c < dots; c += 1) {
          if (!vEdges[r][c]) moves.push({ type: "v", row: r, col: c });
        }
      }
      return moves;
    }

    function cloneStateFromCurrent() {
      return {
        dots,
        hEdges: hEdges.map((row) => row.slice()),
        vEdges: vEdges.map((row) => row.slice()),
        boxes: boxes.map((row) => row.slice()),
      };
    }

    function legalMovesFromState(state) {
      const moves = [];
      for (let r = 0; r < state.dots; r += 1) {
        for (let c = 0; c < state.dots - 1; c += 1) {
          if (!state.hEdges[r][c]) moves.push({ type: "h", row: r, col: c });
        }
      }
      for (let r = 0; r < state.dots - 1; r += 1) {
        for (let c = 0; c < state.dots; c += 1) {
          if (!state.vEdges[r][c]) moves.push({ type: "v", row: r, col: c });
        }
      }
      return moves;
    }

    function checkAndClaimBoxInState(state, r, c, player) {
      if (state.boxes[r][c] !== null) return false;
      const top = state.hEdges[r][c] !== null;
      const bottom = state.hEdges[r + 1][c] !== null;
      const left = state.vEdges[r][c] !== null;
      const right = state.vEdges[r][c + 1] !== null;
      if (top && bottom && left && right) {
        state.boxes[r][c] = player;
        return true;
      }
      return false;
    }

    function resolveBoxesFromEdgeInState(state, type, row, col, player) {
      let made = 0;
      if (type === "h") {
        if (row > 0 && checkAndClaimBoxInState(state, row - 1, col, player)) made += 1;
        if (row < state.dots - 1 && checkAndClaimBoxInState(state, row, col, player)) made += 1;
      } else {
        if (col > 0 && checkAndClaimBoxInState(state, row, col - 1, player)) made += 1;
        if (col < state.dots - 1 && checkAndClaimBoxInState(state, row, col, player)) made += 1;
      }
      return made;
    }

    function applyMoveToState(state, move, player) {
      if (move.type === "h") state.hEdges[move.row][move.col] = player;
      else state.vEdges[move.row][move.col] = player;
      const boxesWon = resolveBoxesFromEdgeInState(state, move.type, move.row, move.col, player);
      const nextPlayer = boxesWon > 0 ? player : (player === HUMAN ? AI : HUMAN);
      return { boxesWon, nextPlayer };
    }

    function allBoxesClaimedInState(state) {
      for (const row of state.boxes) {
        for (const owner of row) {
          if (owner === null) return false;
        }
      }
      return true;
    }

    function scoreDiffInState(state) {
      let ai = 0;
      let human = 0;
      for (const row of state.boxes) {
        for (const owner of row) {
          if (owner === AI) ai += 1;
          else if (owner === HUMAN) human += 1;
        }
      }
      return ai - human;
    }

    function countEdgesAroundBoxInState(state, r, c) {
      let count = 0;
      if (state.hEdges[r][c] !== null) count += 1;
      if (state.hEdges[r + 1][c] !== null) count += 1;
      if (state.vEdges[r][c] !== null) count += 1;
      if (state.vEdges[r][c + 1] !== null) count += 1;
      return count;
    }

    function evaluateStateClassic(state, currentPlayer) {
      let score = scoreDiffInState(state) * 100;

      for (let r = 0; r < state.dots - 1; r += 1) {
        for (let c = 0; c < state.dots - 1; c += 1) {
          if (state.boxes[r][c] !== null) continue;
          const edgeCount = countEdgesAroundBoxInState(state, r, c);
          if (edgeCount === 3) {
            score += currentPlayer === AI ? 8 : -8;
          } else if (edgeCount === 2) {
            score += 1;
          } else if (edgeCount <= 1) {
            score += 0.2;
          }
        }
      }

      return score;
    }

    function summarizeOpenBoxes(state) {
      const summary = { zero: 0, one: 0, two: 0, three: 0 };
      for (let r = 0; r < state.dots - 1; r += 1) {
        for (let c = 0; c < state.dots - 1; c += 1) {
          if (state.boxes[r][c] !== null) continue;
          const edges = countEdgesAroundBoxInState(state, r, c);
          if (edges === 0) summary.zero += 1;
          else if (edges === 1) summary.one += 1;
          else if (edges === 2) summary.two += 1;
          else if (edges === 3) summary.three += 1;
        }
      }
      return summary;
    }

    function estimateTwoEdgeChains(state) {
      const rows = state.dots - 1;
      const cols = state.dots - 1;
      const seen = make2D(rows, cols, false);
      let longChains = 0;
      let longChainCells = 0;

      function neighbors(r, c) {
        return [
          [r - 1, c],
          [r + 1, c],
          [r, c - 1],
          [r, c + 1],
        ];
      }

      for (let r = 0; r < rows; r += 1) {
        for (let c = 0; c < cols; c += 1) {
          if (seen[r][c]) continue;
          if (state.boxes[r][c] !== null) continue;
          if (countEdgesAroundBoxInState(state, r, c) !== 2) continue;

          let componentSize = 0;
          const stack = [[r, c]];
          seen[r][c] = true;

          while (stack.length > 0) {
            const [cr, cc] = stack.pop();
            componentSize += 1;
            for (const [nr, nc] of neighbors(cr, cc)) {
              if (nr < 0 || nc < 0 || nr >= rows || nc >= cols) continue;
              if (seen[nr][nc]) continue;
              if (state.boxes[nr][nc] !== null) continue;
              if (countEdgesAroundBoxInState(state, nr, nc) !== 2) continue;
              seen[nr][nc] = true;
              stack.push([nr, nc]);
            }
          }

          if (componentSize >= 3) {
            longChains += 1;
            longChainCells += componentSize;
          }
        }
      }

      return { longChains, longChainCells };
    }

    function evaluateStateHumanLike(state, currentPlayer) {
      const remainingMoves = legalMovesFromState(state).length;
      const open = summarizeOpenBoxes(state);
      const chains = estimateTwoEdgeChains(state);
      const lateGame = remainingMoves <= 14;

      let score = scoreDiffInState(state) * 120;

      if (lateGame) {
        score += open.three * (currentPlayer === AI ? 20 : -20);
        score += open.two * -0.8;
        score += chains.longChainCells * 0.6;
      } else {
        score += open.three * (currentPlayer === AI ? 8 : -14);
        score += open.two * -3.6;
        score += open.one * 1.4;
        score += open.zero * 0.7;
        score += chains.longChains * -3.2;
        score += chains.longChainCells * -1.4;
      }

      return score;
    }

    function minimax(state, depth, alpha, beta, currentPlayer, evaluateFn) {
      if (depth === 0 || allBoxesClaimedInState(state)) {
        return { value: evaluateFn(state, currentPlayer), move: null };
      }

      const moves = legalMovesFromState(state);
      if (moves.length === 0) {
        return { value: evaluateFn(state, currentPlayer), move: null };
      }

      const maximizing = currentPlayer === AI;
      let bestValue = maximizing ? -Infinity : Infinity;
      let bestMove = moves[0];

      for (const move of moves) {
        const nextState = {
          dots: state.dots,
          hEdges: state.hEdges.map((row) => row.slice()),
          vEdges: state.vEdges.map((row) => row.slice()),
          boxes: state.boxes.map((row) => row.slice()),
        };
        const result = applyMoveToState(nextState, move, currentPlayer);
        const child = minimax(nextState, depth - 1, alpha, beta, result.nextPlayer, evaluateFn);

        if (maximizing) {
          if (child.value > bestValue) {
            bestValue = child.value;
            bestMove = move;
          }
          alpha = Math.max(alpha, bestValue);
        } else {
          if (child.value < bestValue) {
            bestValue = child.value;
            bestMove = move;
          }
          beta = Math.min(beta, bestValue);
        }

        if (beta <= alpha) break;
      }

      return { value: bestValue, move: bestMove };
    }

    function getMinimaxDepth(remaining, mode) {
      if (mode === "humanlike") {
        let depth = 3;
        if (remaining <= 12) depth = 7;
        else if (remaining <= 20) depth = 6;
        else if (remaining <= 32) depth = 4;
        return depth;
      }

      let depth = 3;
      if (remaining <= 14) depth = 8;
      else if (remaining <= 22) depth = 6;
      else if (remaining <= 34) depth = 4;
      return depth;
    }

    function pickMinimaxMove() {
      const state = cloneStateFromCurrent();
      if (state.dots - 1 >= 10) {
        const moves = legalMovesFromState(state);
        return moves[Math.floor(Math.random() * moves.length)] || null;
      }
      const remaining = legalMovesFromState(state).length;
      const depth = getMinimaxDepth(remaining, "classic");

      const result = minimax(state, depth, -Infinity, Infinity, AI, evaluateStateClassic);
      return result.move;
    }

    function pickHumanLikeMinimaxMove() {
      const rootState = cloneStateFromCurrent();
      const moves = legalMovesFromState(rootState);
      if (moves.length === 0) return null;
      if (rootState.dots - 1 >= 10) {
        return moves[Math.floor(Math.random() * moves.length)];
      }

      const remaining = moves.length;
      const depth = getMinimaxDepth(remaining, "humanlike");

      let best = -Infinity;
      const ranked = [];

      for (const move of moves) {
        const nextState = {
          dots: rootState.dots,
          hEdges: rootState.hEdges.map((row) => row.slice()),
          vEdges: rootState.vEdges.map((row) => row.slice()),
          boxes: rootState.boxes.map((row) => row.slice()),
        };
        const result = applyMoveToState(nextState, move, AI);
        const child = minimax(nextState, depth - 1, -Infinity, Infinity, result.nextPlayer, evaluateStateHumanLike);
        ranked.push({ move, value: child.value });
        if (child.value > best) best = child.value;
      }

      const epsilon = 2.5;
      const topBand = ranked.filter((entry) => entry.value >= best - epsilon);
      const pool = topBand.length > 0 ? topBand : ranked;
      const selected = pool[Math.floor(Math.random() * pool.length)];
      return selected.move;
    }

    function updateHintForAiLogic() {
      if (aiLogicEl.value === "minimax") {
        aiHintEl.textContent = "Click an available edge to draw a line. The agent is using minimax with look-ahead (auto-simplifies on very large boards).";
      } else if (aiLogicEl.value === "humanlike") {
        aiHintEl.textContent = "Click an available edge to draw a line. The agent uses a human-like minimax style with safer midgame choices (auto-simplifies on very large boards).";
      } else {
        aiHintEl.textContent = "Click an available edge to draw a line. The agent currently chooses random legal moves.";
      }
    }

    function finishIfNeeded() {
      if (!allBoxesClaimed()) return false;
      gameOver = true;
      const human = scoreOf(HUMAN);
      const ai = scoreOf(AI);
      if (human > ai) {
        statusEl.textContent = `Game over. You win ${human} to ${ai}.`;
      } else if (ai > human) {
        statusEl.textContent = `Game over. Agent wins ${ai} to ${human}.`;
      } else {
        statusEl.textContent = `Game over. Draw ${human}-${ai}.`;
      }
      return true;
    }

    function setStatus(extra = "") {
      if (gameOver) return;
      const base = currentPlayer === HUMAN ? "Your turn." : "Agent is choosing a move...";
      statusEl.textContent = `${base}${extra ? ` ${extra}` : ""}`;
    }

    function refreshBoardUI() {
      for (const edge of boardEl.querySelectorAll(".hedge,.vedge")) {
        const type = edge.dataset.type;
        const row = Number(edge.dataset.row);
        const col = Number(edge.dataset.col);
        edge.classList.remove("claimed-human", "claimed-ai", "open");

        const owner = type === "h" ? hEdges[row][col] : vEdges[row][col];
        if (owner === HUMAN) edge.classList.add("claimed-human");
        else if (owner === AI) edge.classList.add("claimed-ai");
        else edge.classList.add("open");
      }

      for (const boxEl of boardEl.querySelectorAll(".box")) {
        const row = Number(boxEl.dataset.row);
        const col = Number(boxEl.dataset.col);
        boxEl.classList.remove("human", "ai");
        const owner = boxes[row][col];
        if (owner) boxEl.classList.add(owner);
      }

      humanScoreEl.textContent = String(scoreOf(HUMAN));
      aiScoreEl.textContent = String(scoreOf(AI));
    }

    function buildBoardUI() {
      boardEl.innerHTML = "";
      applyBoardSizing();

      for (let r = 0; r < dots * 2 - 1; r += 1) {
        for (let c = 0; c < dots * 2 - 1; c += 1) {
          const evenR = r % 2 === 0;
          const evenC = c % 2 === 0;

          if (evenR && evenC) {
            const dot = document.createElement("div");
            dot.className = "dot";
            boardEl.appendChild(dot);
          } else if (evenR && !evenC) {
            const h = document.createElement("button");
            h.type = "button";
            h.className = "hedge open";
            h.dataset.type = "h";
            h.dataset.row = String(r / 2);
            h.dataset.col = String((c - 1) / 2);
            h.addEventListener("click", onHumanMove);
            boardEl.appendChild(h);
          } else if (!evenR && evenC) {
            const v = document.createElement("button");
            v.type = "button";
            v.className = "vedge open";
            v.dataset.type = "v";
            v.dataset.row = String((r - 1) / 2);
            v.dataset.col = String(c / 2);
            v.addEventListener("click", onHumanMove);
            boardEl.appendChild(v);
          } else {
            const b = document.createElement("div");
            b.className = "box";
            b.dataset.row = String((r - 1) / 2);
            b.dataset.col = String((c - 1) / 2);
            boardEl.appendChild(b);
          }
        }
      }
    }

    function applyMove(type, row, col, player) {
      claimEdge(type, row, col, player);
      const boxesWon = resolveBoxesFromEdge(type, row, col, player);
      refreshBoardUI();

      if (finishIfNeeded()) return;
      if (boxesWon === 0) {
        currentPlayer = player === HUMAN ? AI : HUMAN;
      }
      const bonusText = boxesWon > 0 ? `${player === HUMAN ? "You" : "Agent"} completed ${boxesWon} box${boxesWon > 1 ? "es" : ""}.` : "";
      setStatus(bonusText);

      if (!gameOver && currentPlayer === AI) {
        window.setTimeout(playAiTurn, 420);
      }
    }

    function onHumanMove(event) {
      if (gameOver || currentPlayer !== HUMAN) return;
      const edge = event.currentTarget;
      const type = edge.dataset.type;
      const row = Number(edge.dataset.row);
      const col = Number(edge.dataset.col);
      if (isEdgeClaimed(type, row, col)) return;
      applyMove(type, row, col, HUMAN);
    }

    function playAiTurn() {
      if (gameOver || currentPlayer !== AI) return;
      const moves = legalMoves();
      if (moves.length === 0) {
        finishIfNeeded();
        return;
      }

      let pick;
      if (aiLogicEl.value === "minimax") {
        pick = pickMinimaxMove();
      } else if (aiLogicEl.value === "humanlike") {
        pick = pickHumanLikeMinimaxMove();
      }
      if (!pick) {
        pick = moves[Math.floor(Math.random() * moves.length)];
      }
      applyMove(pick.type, pick.row, pick.col, AI);
    }

    function newGame() {
      const parsed = Number(sizeEl.value);
      const size = Number.isFinite(parsed) ? Math.max(2, Math.min(30, Math.floor(parsed))) : 5;
      sizeEl.value = String(size);
      setupState(size);
      buildBoardUI();
      refreshBoardUI();
      setStatus();
    }

    newGameEl.addEventListener("click", newGame);
    sizeEl.addEventListener("change", newGame);
    edgeSizeEl.addEventListener("change", applyBoardSizing);
    edgeSizeEl.addEventListener("input", applyBoardSizing);
    zoomEl.addEventListener("input", applyBoardSizing);
    zoomEl.addEventListener("change", applyBoardSizing);
    aiLogicEl.addEventListener("change", updateHintForAiLogic);
    applyBoardSizing();
    updateHintForAiLogic();
    newGame();
  </script>
</body>
</html>
